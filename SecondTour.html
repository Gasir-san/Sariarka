<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тур 2: Тайны Природы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            overflow: hidden;
        }

        #background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: url('https://images.unsplash.com/photo-1552083375-1447ce886485?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .option-btn {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            color: #475569;
            transition: all 0.25s ease;
        }

        .option-btn.correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            transform: scale(1.02);
        }

        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }

        .option-btn:hover:not(.disabled) {
            border-color: #f4d03f;
            background-color: #fffbeb;
            transform: translateY(-2px);
        }

        .image-frame {
            width: 100%;
            height: 200px;
            border-radius: 24px;
            overflow: hidden;
            background: #f1f5f9;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .progress-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: #f4d03f;
            width: 0%;
            transition: width 0.5s ease;
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="background-container"></div>
    
    <div class="relative z-10 h-screen flex flex-col items-center justify-center p-4">
        <!-- Инфо панель -->
        <div class="absolute top-8 left-8 flex items-center gap-3 bg-white/80 p-3 rounded-2xl border border-white">
            <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">
                <span class="text-yellow-600 font-bold">👤</span>
            </div>
            <div>
                <p class="text-slate-400 text-[10px] uppercase tracking-widest font-bold">Путник</p>
                <p id="display-name" class="text-slate-800 font-bold italic">...</p>
            </div>
        </div>

        <div id="score-panel" class="absolute top-8 right-8 text-right bg-white/80 p-3 rounded-2xl border border-white">
            <p class="text-slate-400 text-[10px] uppercase tracking-widest font-bold">Баллы</p>
            <p id="display-score" class="text-2xl font-black text-yellow-600">4</p>
        </div>

        <!-- Карточка викторины -->
        <div id="quiz-card" class="glass-panel p-6 md:p-10 rounded-[40px] w-full max-w-xl fade-in">
            <div class="mb-6">
                <div class="progress-bar mb-6">
                    <div id="progress-fill"></div>
                </div>
                
                <div id="question-image-container" class="image-frame mb-6">
                    <img id="question-image" src="" alt="Вопрос">
                </div>

                <div class="flex justify-between items-center mb-2">
                    <p id="question-number" class="text-slate-400 text-xs uppercase tracking-widest font-bold">Вопрос 1 из 6</p>
                </div>
                <h2 id="question-text" class="text-xl md:text-2xl font-bold font-serif text-slate-800 leading-tight">Загрузка вопроса...</h2>
            </div>

            <div id="options-container" class="grid grid-cols-1 gap-3"></div>
        </div>

        <!-- Результаты -->
        <div id="result-card" class="hidden glass-panel p-10 rounded-[40px] w-full max-w-lg text-center fade-in">
            <div id="result-icon" class="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">🏆</div>
            <h2 id="result-title" class="text-4xl font-serif italic text-slate-800 mb-2">Второй тур окончен</h2>
            <p id="final-message" class="text-slate-500 mb-8"></p>
            
            <div class="bg-slate-50 p-8 rounded-3xl mb-8 border border-slate-100">
                <p class="text-xs uppercase tracking-widest text-slate-400 mb-2">Общий итог (Тур 1 + Тур 2)</p>
                <div class="flex items-center justify-center gap-2">
                    <span id="final-score" class="text-7xl font-black text-slate-800">4</span>
                    <span class="text-3xl text-slate-300 font-light">/ 10</span>
                </div>
            </div>
            
            <div id="result-actions"></div>
        </div>
    </div>

    <script>
        // Данные вопросов (подставьте свои пути к изображениям)
        const quizData = [
            {
                question: "Что это за природная зона?",
                image: "0q.jpg", // ЗАМЕНИТЕ НА ВАШ ФАЙЛ
                options: ["лес", "пустыня", "степь"],
                correct: 2
            },
            {
                question: "Как называется это животное?",
                image: "1q.jpg", // ЗАМЕНИТЕ НА ВАШ ФАЙЛ
                options: ["олень", "сайгак", "коза"],
                correct: 1
            },
            {
                question: "Какие птицы живут здесь?",
                image: "2q.jpg", // ЗАМЕНИТЕ НА ВАШ ФАЙЛ
                options: ["пингвины", "фламинго", "орлы"],
                correct: 1
            },
            {
                question: "В какой части Казахстана находится Сарыарка?",
                image: "3q.jpg", // ЗАМЕНИТЕ НА ВАШ ФАЙЛ
                options: ["на севере", "в центре", "на юге"],
                correct: 1
            },
            {
                question: "Какое животное помогает людям в жаркой степи?",
                image: "camel.jpg", // ЗАМЕНИТЕ НА ВАШ ФАЙЛ
                options: ["лошадь", "верблюд", "собака"],
                correct: 1
            },
            {
                question: "Какая птица является символом силы степи?",
                image: "eagle.jpg", // ЗАМЕНИТЕ НА ВАШ ФАЙЛ
                options: ["воробей", "орёл", "голубь"],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 4; // Стартуем с 4 баллами после 1 тура
        let canAnswer = true;
        const playerName = localStorage.getItem('saryarka_player_name') || "Путник";

        const questionText = document.getElementById('question-text');
        const questionImage = document.getElementById('question-image');
        const optionsContainer = document.getElementById('options-container');
        const questionNumber = document.getElementById('question-number');
        const progressFill = document.getElementById('progress-fill');
        const displayScore = document.getElementById('display-score');
        const quizCard = document.getElementById('quiz-card');
        const resultCard = document.getElementById('result-card');
        const displayName = document.getElementById('display-name');
        const resultActions = document.getElementById('result-actions');

        function init() {
            displayName.innerText = playerName;
            displayScore.innerText = score;
            loadQuestion();
        }

        function loadQuestion() {
            canAnswer = true;
            const data = quizData[currentQuestion];
            
            questionNumber.innerText = `Вопрос ${currentQuestion + 1} из ${quizData.length}`;
            questionText.innerText = data.question;
            questionImage.src = data.image;
            
            // Если картинка не загрузится, показываем плейсхолдер
            questionImage.onerror = function() {
                this.src = "https://via.placeholder.com/600x300?text=Изображение+не+найдено";
            };

            progressFill.style.width = `${((currentQuestion) / quizData.length) * 100}%`;
            
            optionsContainer.innerHTML = '';
            data.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-2xl text-base font-semibold';
                btn.innerText = option;
                btn.onclick = () => handleAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex, clickedBtn) {
            if (!canAnswer) return;
            canAnswer = false;

            const correctIndex = quizData[currentQuestion].correct;
            const allButtons = optionsContainer.querySelectorAll('.option-btn');

            allButtons.forEach(btn => btn.classList.add('disabled', 'cursor-default'));

            if (selectedIndex === correctIndex) {
                clickedBtn.classList.add('correct');
                score++;
                displayScore.innerText = score;
            } else {
                clickedBtn.classList.add('wrong');
                allButtons[correctIndex].classList.add('correct');
            }

            currentQuestion++;

            setTimeout(() => {
                if (currentQuestion < quizData.length) {
                    quizCard.style.opacity = '0';
                    setTimeout(() => {
                        loadQuestion();
                        quizCard.style.opacity = '1';
                    }, 300);
                } else {
                    showResults();
                }
            }, 1000);
        }

        function showResults() {
            progressFill.style.width = '100%';
            quizCard.classList.add('hidden');
            resultCard.classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            let message = "";
            let buttonHTML = "";

            // Нужно набрать 10 баллов (4 из 1 тура + 6 из 2 тура)
            if (score >= 10) {
                message = "Потрясающе! Вы узнали всех обитателей и особенности Сарыарки.";
                document.getElementById('result-icon').innerText = "🏔️";
                buttonHTML = `
                    <button onclick="window.location.href='Thirst tour.html'" class="w-full py-5 bg-yellow-500 text-black font-bold uppercase rounded-2xl hover:bg-yellow-400 transition-all shadow-lg flex items-center justify-center gap-2">
                        Перейти в 3 тур <span class="text-xl">➔</span>
                    </button>
                `;
            } else {
                message = "Для продолжения нужно ответить правильно на все вопросы этого тура.";
                document.getElementById('result-icon').innerText = "🔎";
                buttonHTML = `
                    <button onclick="location.reload()" class="w-full py-5 bg-slate-800 text-white font-bold uppercase rounded-2xl hover:bg-slate-700 transition-all">
                        Попробовать второй тур снова
                    </button>
                `;
            }
            
            document.getElementById('final-message').innerText = `${playerName}, ${message}`;
            resultActions.innerHTML = buttonHTML;
        }

        window.onload = init;
    </script>
</body>
</html>
