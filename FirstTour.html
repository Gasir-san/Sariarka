<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тур 1: Знаток Степи (YouTube версия)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            overflow: hidden;
        }

        #background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=2074&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .option-btn {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            color: #475569;
            transition: all 0.25s ease;
        }

        .option-btn.correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            transform: scale(1.02);
        }

        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }

        .option-btn:hover:not(.disabled) {
            border-color: #f4d03f;
            background-color: #fffbeb;
            transform: translateY(-2px);
        }

        .progress-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: #f4d03f;
            width: 0%;
            transition: width 0.5s ease;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="background-container"></div>
    
    <div class="relative z-10 h-screen flex flex-col items-center justify-center p-4">
        <!-- Информационная панель -->
        <div class="absolute top-8 left-8 flex items-center gap-3 bg-white/80 p-3 rounded-2xl border border-white">
            <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">
                <span class="text-yellow-600 font-bold">👤</span>
            </div>
            <div>
                <p class="text-slate-400 text-[10px] uppercase tracking-widest font-bold">Путник</p>
                <p id="display-name" class="text-slate-800 font-bold italic">Загрузка...</p>
            </div>
        </div>

        <div id="score-panel" class="hidden absolute top-8 right-8 text-right bg-white/80 p-3 rounded-2xl border border-white">
            <p class="text-slate-400 text-[10px] uppercase tracking-widest font-bold">Баллы</p>
            <p id="display-score" class="text-2xl font-black text-yellow-600">0</p>
        </div>

        <!-- Окно с видео -->
        <div id="video-card" class="glass-panel p-6 md:p-8 rounded-[40px] w-full max-w-3xl fade-in">
            <div class="mb-6 text-center">
                <span class="px-4 py-1 bg-yellow-100 text-yellow-700 rounded-full text-xs font-bold uppercase tracking-wider">Подготовка</span>
                <h2 class="text-2xl md:text-3xl font-bold font-serif text-slate-800 mt-2">Посмотрите видео о Сарыарке</h2>
                <p class="text-slate-500 text-sm mt-1">Внимательно изучите материал, чтобы ответить на все вопросы викторины.</p>
            </div>

            <div id="video-wrapper" class="video-container shadow-2xl mb-8">
                <!-- YouTube Iframe с дополнительными параметрами безопасности и API -->
                <iframe 
                    id="yt-player"
                    src="https://www.youtube.com/embed/q6AUY2SaQQ4?si=SjdQeVK8czxdGwUY" 
                    title="YouTube video player" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            </div>

            <button onclick="startQuiz()" class="w-full py-5 bg-slate-800 text-white font-bold uppercase rounded-2xl hover:bg-slate-700 transition-all shadow-lg hover:shadow-xl active:scale-95 flex items-center justify-center gap-3">
                Я готов к викторине <span class="text-xl">➔</span>
            </button>
        </div>

        <!-- Карточка викторины -->
        <div id="quiz-card" class="hidden glass-panel p-8 md:p-12 rounded-[40px] w-full max-w-2xl fade-in">
            <div class="mb-8">
                <div class="progress-bar mb-6">
                    <div id="progress-fill"></div>
                </div>
                <div class="flex justify-between items-center mb-4">
                    <p id="question-number" class="text-slate-400 text-xs uppercase tracking-widest font-bold">Вопрос 1 из 4</p>
                    <span class="px-3 py-1 bg-yellow-100 text-yellow-700 rounded-full text-[10px] font-bold uppercase tracking-wider">+1 балл</span>
                </div>
                <h2 id="question-text" class="text-2xl md:text-4xl font-bold font-serif text-slate-800 leading-tight">Загрузка вопроса...</h2>
            </div>

            <div id="options-container" class="space-y-4"></div>
        </div>

        <!-- Экран результатов -->
        <div id="result-card" class="hidden glass-panel p-10 rounded-[40px] w-full max-w-lg text-center fade-in">
            <div id="result-icon" class="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">🏆</div>
            <h2 id="result-title" class="text-4xl font-serif italic text-slate-800 mb-2">Тур завершен!</h2>
            <p id="final-message" class="text-slate-500 mb-8"></p>
            
            <div class="bg-slate-50 p-8 rounded-3xl mb-8 border border-slate-100">
                <p class="text-xs uppercase tracking-widest text-slate-400 mb-2">Ваш итоговый счет</p>
                <div class="flex items-center justify-center gap-2">
                    <span id="final-score" class="text-7xl font-black text-slate-800">0</span>
                    <span class="text-3xl text-slate-300 font-light">/ 4</span>
                </div>
            </div>
            
            <div id="result-actions"></div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Где находится Сарыарка?",
                options: ["на севере Казахстана", "в Центре Казахстана", "на юге Казахстана"],
                correct: 1
            },
            {
                question: "Как ещё называют Сарыарку?",
                options: ["великая степь", "Казахский мелкосопочник", "Алтайские горы"],
                correct: 1
            },
            {
                question: "Какой климат в Сарыарке?",
                options: ["тёплый и влажный", "холодный и снежный круглый год", "резко континентальный"],
                correct: 2
            },
            {
                question: "Что можно найти в Сарыарке?",
                options: ["высокие горы с вечными снегами", "озёра и степные просторы", "тропические леса"],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let canAnswer = true;
        const playerName = localStorage.getItem('saryarka_player_name') || "Путник";

        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const questionNumber = document.getElementById('question-number');
        const progressFill = document.getElementById('progress-fill');
        const displayScore = document.getElementById('display-score');
        const quizCard = document.getElementById('quiz-card');
        const videoCard = document.getElementById('video-card');
        const scorePanel = document.getElementById('score-panel');
        const resultCard = document.getElementById('result-card');
        const displayName = document.getElementById('display-name');
        const resultActions = document.getElementById('result-actions');

        function init() {
            displayName.innerText = playerName;
        }

        function startQuiz() {
            // Полное удаление iframe для остановки потока данных
            const wrapper = document.getElementById('video-wrapper');
            if (wrapper) wrapper.innerHTML = '';

            videoCard.style.opacity = '0';
            setTimeout(() => {
                videoCard.classList.add('hidden');
                quizCard.classList.remove('hidden');
                scorePanel.classList.remove('hidden');
                loadQuestion();
            }, 400);
        }

        function loadQuestion() {
            canAnswer = true;
            const data = quizData[currentQuestion];
            
            questionNumber.innerText = `Вопрос ${currentQuestion + 1} из ${quizData.length}`;
            questionText.innerText = data.question;
            progressFill.style.width = `${((currentQuestion) / quizData.length) * 100}%`;
            
            optionsContainer.innerHTML = '';
            data.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-5 rounded-2xl text-lg font-semibold';
                btn.innerText = option;
                btn.onclick = () => handleAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex, clickedBtn) {
            if (!canAnswer) return;
            canAnswer = false;

            const correctIndex = quizData[currentQuestion].correct;
            const allButtons = optionsContainer.querySelectorAll('.option-btn');

            allButtons.forEach(btn => btn.classList.add('disabled', 'cursor-default'));

            if (selectedIndex === correctIndex) {
                clickedBtn.classList.add('correct');
                score++;
                displayScore.innerText = score;
            } else {
                clickedBtn.classList.add('wrong');
                allButtons[correctIndex].classList.add('correct');
            }

            currentQuestion++;

            setTimeout(() => {
                if (currentQuestion < quizData.length) {
                    quizCard.style.opacity = '0';
                    setTimeout(() => {
                        loadQuestion();
                        quizCard.style.opacity = '1';
                    }, 300);
                } else {
                    showResults();
                }
            }, 1200);
        }

        function showResults() {
            progressFill.style.width = '100%';
            quizCard.classList.add('hidden');
            resultCard.classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            let message = "";
            let buttonHTML = "";

            if (score === quizData.length) {
                message = "Вы настоящий эксперт! Сарыарка гордится вами.";
                document.getElementById('result-icon').innerText = "🌟";
                buttonHTML = `
                    <button onclick="window.location.href='SecondTour.html'" class="w-full py-5 bg-yellow-500 text-black font-bold uppercase rounded-2xl hover:bg-yellow-400 transition-all shadow-lg hover:shadow-xl active:scale-95 flex items-center justify-center gap-2">
                        Далее <span class="text-xl">➔</span>
                    </button>
                `;
            } else {
                message = "Вы были близки, но для продолжения пути нужно знать степь в совершенстве.";
                document.getElementById('result-icon').innerText = "🌱";
                buttonHTML = `
                    <button onclick="location.reload()" class="w-full py-5 bg-slate-800 text-white font-bold uppercase rounded-2xl hover:bg-slate-700 transition-all shadow-lg hover:shadow-xl active:scale-95">
                        Попробовать снова
                    </button>
                `;
            }
            
            document.getElementById('final-message').innerText = `${playerName}, ${message}`;
            resultActions.innerHTML = buttonHTML;
        }

        window.onload = init;
    </script>
</body>
</html>
